name: PyPi Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v7.6.2
  release:
    types: [released]

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v4
      -
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      -
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      -
        name: Build package
        run: python -m build
      -
        name: Upload dists
        uses: actions/upload-artifact@v4
        with:
          name: "dist"
          path: "dist/"

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      -
        name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: "dist"
          path: "dist/"
      -
        name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          gh release upload "${RELEASE_TAG}" dist/* --repo "${{ github.repository }}" --clobber
      -
        name: Publish to Pypi
        if: github.repository == 'emby-keeper/emby-keeper'
        uses: pypa/gh-action-pypi-publish@release/v1
