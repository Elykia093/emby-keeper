name: Update Stable Branch

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to promote to stable
        required: true
        default: v7.6.2
  release:
    types: [released]

permissions:
  contents: write
  actions: write

env:
  TARGET_REF: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

jobs:
  update-stable:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create or update stable branch
      run: |
        if [ $(git ls-remote --heads origin stable | wc -l) -eq 0 ]; then
          git checkout -b stable
        else
          git checkout stable
        fi
        git reset --hard "${TARGET_REF}"
        git push origin stable --force
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
